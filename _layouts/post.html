<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - PluginProof</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #1a1a1a;
      color: #e5e7eb;
    }
    .content-container h2, .content-container h3 {
      color: #a7f3d0;
      font-weight: 700;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
    }
    .content-container p {
      margin-bottom: 1rem;
      line-height: 1.75;
    }
    .code-snippet {
      background-color: #0d0d0d;
      padding: 1rem;
      border-left: 4px solid #a7f3d0;
      overflow-x: auto;
      margin-bottom: 1.5rem;
      font-family: monospace;
      color: #d1d5db;
    }
    .cta-banner {
      background-color: #252525;
      padding: 2rem;
      border-radius: 12px;
      border: 1px solid #3d3d3d;
    }
  </style>
</head>
<body class="antialiased">
  <div class="max-w-4xl mx-auto p-4 md:p-8 lg:p-12">

    <header class="mb-10 text-center">
      <a href="/index.html" class="text-green-400 hover:text-green-300 text-sm font-semibold uppercase tracking-widest">&larr; Back to PluginProof Services</a>
      <h1 class="text-4xl md:text-5xl font-extrabold text-white mt-4 tracking-tight">
        {{ page.title }}
      </h1>
      <p class="text-lg text-gray-400 mt-2">By Aaron Shippey | {{ page.date | date: "%b %d, %Y" }}</p>
    </header>

    <div class="content-container text-gray-300">
      {{ content }}
    </div>

  </div>
</body>
</html>
